name: psyscreen-vacancies-test

services:
  vacancies-pg-test:
    image: postgres:17-alpine
    container_name: vacancies-pg-test
    environment:
      POSTGRES_USER: ${DATABASE_USER:-vacancies}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-vacancies123}
      POSTGRES_DB: ${DATABASE_NAME:-vacancies}
    ports:
      - '${DATABASE_PORT:-5484}:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${DATABASE_USER:-vacancies} -d ${DATABASE_NAME:-vacancies}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    pull_policy: if_not_present
