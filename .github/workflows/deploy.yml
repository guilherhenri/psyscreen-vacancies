name: Deploy

on:
  workflow_call:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: docker.io
      API_IMAGE_NAME: guilherhenri/psyscreen-vacancies
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: guilherhenri
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for production image
        id: meta-prod
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Extract metadata for migration image
        id: meta-migrator
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}
          tags: |
            type=sha,prefix=migrator-,format=short
            type=raw,value=migrator

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          push: true
          target: runner
          tags: ${{ steps.meta-prod.outputs.tags }}
          labels: ${{ steps.meta-prod.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.API_IMAGE_NAME }}:cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.API_IMAGE_NAME }}:cache,mode=max
          platforms: linux/amd64

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile
          push: true
          target: migrator
          tags: ${{ steps.meta-migrator.outputs.tags }}
          labels: ${{ steps.meta-migrator.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.API_IMAGE_NAME }}:cache
          cache-to: type=gha,mode=max
          platforms: linux/amd64
